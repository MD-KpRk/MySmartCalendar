version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    container_name: mysmartcalendar-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-mysmartcalendar}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-secret-key}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TMA_URL=${TMA_URL}
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: mysmartcalendar-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-mysmartcalendar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    
  redis:
    image: redis:7-alpine
    container_name: mysmartcalendar-redis
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: always
    
volumes:
  pgdata:
    name: mysmartcalendar-pgdata
  redisdata:
    name: mysmartcalendar-redisdata
